version: "3.8"

# Define reusable GPU resource constraints
x-resources:
  # la shm_size es calculada de acuerdo al 80% de la memoria RAM como maximo
  # es importante que el ordenador a entrenar tenga al menos lo mismo de swap que de RAM
  &resources_gpu
  shm_size: ${WORKER_RAM_MEMORY}
  hostname: ${USER}
  cap_add:
    - SYS_ADMIN
    - DAC_READ_SEARCH
    - NET_ADMIN
    - SYS_RESOURCE
  privileged: true
  restart: always
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  environment:
    - NVIDIA_VISIBLE_DEVICES=0
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - TZ=Europe/Madrid
  labels:
    - "autoheal=true"
    - "com.centurylinklabs.watchtower.enable=true"
  deploy:
    resources:
      limits:
        cpus: "${WORKER_CPU_CORES}"
        memory: ${WORKER_RAM_MEMORY}
      reservations:
        # cpus: "1.0"
        # memory: 2048M
        # memory_swap: 500M
        devices:
          - driver: nvidia
            device_ids: [ "0" ]
            capabilities: [ gpu ]

services:
  executor:
    <<: *resources_gpu
    build:
      context: ./wtrain
      dockerfile: Dockerfile
    image: wisrovi/train_service:worker_executor_v1.0.0
    env_file:
      - config/control_host.env
      - config/user.env
    volumes:
      - /home/wyolo/events:/wyolo/worker/events
      - /home/wyolo/request:/wyolo/worker/request
      - /home/wyolo/train_service_results:/wyolo/worker/train_service_results
      # development only
      - ./wtrain/app:/app
    network_mode: host
    # command: bash -c python main.py --file "/wyolo/control_server/datasets/clasification/colorball.v8i.multiclass/config_train.yaml"
    command: tail -f /dev/null
    # development only

