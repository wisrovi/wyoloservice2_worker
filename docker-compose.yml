# The INVOKER: Hierarchical queue consumption (Private > High > Medium > Low)
# Usage: PRIVATE_QUEUE=worker_gpu1 docker-compose up -d
# Or edit .env file to set PRIVATE_QUEUE=worker_yourname

version: '3.8'

services:
  worker:
    build: ./invoker
    image: wisrovi/train_service:worker_invoker_v1.0.0
    container_name: worker_${WORKER_NAME:-default}
    hostname: worker_${WORKER_NAME:-default}
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 300M
        reservations:
          memory: 100M
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    environment:
      - REDIS_URL=${REDIS_URL:-redis://192.168.10.252:23437/0}
      - PRIVATE_QUEUE=${WORKER_NAME:-default}
      - OPTUNA_DB_URL=${OPTUNA_DB_URL:-postgresql://postgres:postgres@192.168.10.252:23436/wyoloservice}
    labels:
      - "autoheal=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: [ "CMD", "celery", "-A", "worker_gpu", "inspect", "ping", "-d", "celery@worker_${WORKER_NAME:-default}" ]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      celery -A worker_gpu worker  -Q ${WORKER_NAME:-default},gpus_high,gpus_medium,gpus_low  --loglevel=info --concurrency=1 --prefetch-multiplier=1  -Ofair --max-tasks-per-child=1 --max-memory-per-child=250000 

  dashboard:
    build: ./dashboard
    container_name: dashboard_${WORKER_NAME:-default}
    restart: always
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://192.168.10.252:23437/0}
      - OPTUNA_DB_URL=${OPTUNA_DB_URL:-postgresql://postgres:postgres@192.168.10.252:23436/wyoloservice}
    volumes:
      - ./invoker/config.yaml:/app/invoker/config.yaml

  ml_executor:
    build: ./executor
    image: wisrovi/train_service:worker_executor_v1.0.0
    entrypoint: [ "echo", "Executor image ready" ]
